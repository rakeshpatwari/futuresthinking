<body>
<div id="app"></div>
<script>
const CATS={S:{name:'Social'},T:{name:'Technology'},E:{name:'Environment'},Ec:{name:'Economic'},P:{name:'Political'}};
const CC={
  S:{base:'#c2185b',light:'#fce4ec',text:'#880e4f',dot:'#e91e63'},
  T:{base:'#5e35b1',light:'#ede7f6',text:'#311b92',dot:'#7c4dff'},
  E:{base:'#00897b',light:'#e0f2f1',text:'#004d40',dot:'#1de9b6'},
  Ec:{base:'#e65100',light:'#fff3e0',text:'#bf360c',dot:'#ff9100'},
  P:{base:'#1565c0',light:'#e3f2fd',text:'#0d47a1',dot:'#448aff'}
};
const LOGO_COLORS=['#e91e63','#7c4dff','#1de9b6','#ff9100','#448aff'];
const LENSES=['Strategy','Product','Investment','Research','Policy','Competitive','Exploration'];
let activeLenses=new Set();
function toggleLens(l){activeLenses.has(l)?activeLenses.delete(l):activeLenses.add(l);render();}
const PROVIDERS=[
  {id:'anthropic',name:'Anthropic',sub:'Claude models',models:[{id:'claude-sonnet-4-20250514',name:'Claude Sonnet 4'},{id:'claude-haiku-4-5-20251001',name:'Claude Haiku 4.5'}]},
  {id:'openai',name:'OpenAI',sub:'GPT models',models:[{id:'gpt-4o',name:'GPT-4o'},{id:'gpt-4o-mini',name:'GPT-4o Mini'}]},
  {id:'gemini',name:'Google Gemini',sub:'Gemini models',models:[{id:'gemini-2.5-flash',name:'Gemini 2.5 Flash'},{id:'gemini-2.0-flash',name:'Gemini 2.0 Flash'}]}
];
const HELP={
  anthropic:'<h4>Get your Anthropic API key</h4><ol><li>Go to <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></li><li>Sign up or log in</li><li>Navigate to <strong>API Keys</strong> in the sidebar</li><li>Click <strong>Create Key</strong>, give it a name, and copy it</li><li>Add credit to your account under <strong>Billing</strong> (minimum $5)</li></ol><p>Key format: <code>sk-ant-api03-...</code></p><p>Cost: ~$0.02-0.08 per scan depending on model</p>',
  openai:'<h4>Get your OpenAI API key</h4><ol><li>Go to <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a></li><li>Sign up or log in</li><li>Click <strong>Create new secret key</strong></li><li>Copy it immediately (you won\'t see it again)</li><li>Add credit under <strong>Billing</strong> (minimum $5)</li></ol><p>Key format: <code>sk-proj-...</code> or <code>sk-...</code></p><p>Cost: ~$0.01-0.05 per scan depending on model</p>',
  gemini:'<h4>Get your Google Gemini API key</h4><ol><li>Go to <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></li><li>Sign in with your Google account</li><li>Click <strong>Create API Key</strong></li><li>Select or create a Google Cloud project</li><li>Copy the generated key</li></ol><p>Key format: <code>AIzaSy...</code></p><p>Cost: Free tier available (15 requests/min). Paid tier for higher volume.</p>'
};

const SYSTEM_PROMPT=`You are a STEEP analysis expert. Given a topic (and optionally a lens and context), scan for external signals across Social, Technological, Environmental, Economic, and Political dimensions.

Return ONLY valid JSON. No markdown, no backticks, no preamble, no trailing text.

Structure:
{"signals":[{"id":0,"name":"Short title","cats":["S"],"strength":4,"horizon":"Near","horizonLabel":"1-3 years","brief":"2 sentence summary.","implication":"What this means for the user.","evidence":"Key data points, sources, or real-world indicators supporting this signal.","timeDetail":"Near-term (1-2y): what happens first. Medium-term (3-5y): how it evolves. Long-term (5-10y): where it settles.","direction":"Where this trend leads. Second and third-order effects. What new dynamics emerge.","impact":"Who gets affected and how. Which industries, communities, or institutions face biggest changes. Where are the opportunities and threats.","connectedSignals":"Related signal names."}],"synthesis":{"topLine":"One sentence summary.","themes":[{"label":"Name","body":"2-3 sentences."}],"intersections":[{"cats":["S","Ec"],"insight":"Why these converge."}],"bottomLine":"Personalized takeaway."}}

Rules:
- 10-15 signals across S, T, E, Ec, P categories
- 3-5 signals span multiple categories (intersections)
- strength: 1-5 integer. horizon: "Now"|"Near"|"Mid"|"Long"
- Keep names under 8 words, briefs under 2 sentences
- For each signal provide evidence (real data/sources), timeDetail (phased timeline), direction (2nd/3rd order effects), and impact (who is affected, opportunities and threats)
- If lens/context are provided, tailor implications, direction, and impact to that perspective. Use second person.
- If no lens/context, keep implications broadly applicable.
- 3-4 themes, 2-3 intersections in synthesis
- Be data-driven with real trends and figures`;

// ── State ──
let state={view:'home',config:JSON.parse(localStorage.getItem('steep-config')||'null'),analyses:JSON.parse(localStorage.getItem('steep-analyses')||'[]'),current:null,loading:false,error:'',activeFilter:null,picked:new Set(),deepView:false,showHelp:false,validating:false,validation:null,saved:false,adminProvider:null,expanded:new Set()};

function setState(u){Object.assign(state,u);render();}
function saveConfig(c){localStorage.setItem('steep-config',JSON.stringify(c));state.config=c;state.saved=true;render();setTimeout(()=>{state.saved=false;render()},2000);}
function saveAnalyses(l){localStorage.setItem('steep-analyses',JSON.stringify(l));state.analyses=l;}

// ── Read form values from DOM (never re-render on keystroke) ──
function val(id){const el=document.getElementById(id);return el?el.value:'';}

// ── JSON repair ──
function repairJSON(raw){
  let s=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/i,'').trim();
  try{return JSON.parse(s);}catch(e){}
  const si=s.indexOf('{');if(si>0)s=s.slice(si);
  try{return JSON.parse(s);}catch(e){}
  let inStr=false,esc=false;
  for(let i=0;i<s.length;i++){if(esc){esc=false;continue;}if(s[i]==='\\'){esc=true;continue;}if(s[i]==='"')inStr=!inStr;}
  if(inStr)s+='"';
  let br=0,bk=0;inStr=false;esc=false;
  for(let i=0;i<s.length;i++){if(esc){esc=false;continue;}if(s[i]==='\\'){esc=true;continue;}if(s[i]==='"'){inStr=!inStr;continue;}if(inStr)continue;if(s[i]==='{')br++;if(s[i]==='}')br--;if(s[i]==='[')bk++;if(s[i]===']')bk--;}
  s=s.replace(/,\s*$/,'');
  while(bk>0){s+=']';bk--;}
  while(br>0){s+='}';br--;}
  try{return JSON.parse(s);}catch(e){}
  const m=s.match(/"signals"\s*:\s*(\[[\s\S]*\])/);
  if(m){try{let arr=m[1].trim();
    if(!arr.endsWith(']')){inStr=false;esc=false;for(let i=0;i<arr.length;i++){if(esc){esc=false;continue;}if(arr[i]==='\\'){esc=true;continue;}if(arr[i]==='"')inStr=!inStr;}if(inStr)arr+='"';br=0;bk=0;inStr=false;esc=false;for(let i=0;i<arr.length;i++){if(esc){esc=false;continue;}if(arr[i]==='\\'){esc=true;continue;}if(arr[i]==='"'){inStr=!inStr;continue;}if(inStr)continue;if(arr[i]==='{')br++;if(arr[i]==='}')br--;if(arr[i]==='[')bk++;if(arr[i]===']')bk--;}arr=arr.replace(/,\s*$/,'');while(br>0){arr+='}';br--;}while(bk>0){arr+=']';bk--;}}
    const signals=JSON.parse(arr);
    return{signals,synthesis:{topLine:'Analysis partially truncated. Showing available signals.',themes:[],intersections:[],bottomLine:'Re-run scan for full synthesis.'}};
  }catch(e2){}}
  throw new Error('Could not parse AI response. Try running the scan again.');
}

// ── API ──
async function callAPI(config,topic,lens,context){
  let userMsg='Topic: '+topic;
  if(lens)userMsg+='\nLens: '+lens;
  if(context)userMsg+='\nContext: '+context;
  userMsg+='\n\nPerform a comprehensive STEEP analysis. Return ONLY the JSON object.';
  const maxTok=16000;
  if(config.provider==='anthropic'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':config.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:config.model,max_tokens:maxTok,system:SYSTEM_PROMPT,messages:[{role:'user',content:userMsg}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Anthropic API error '+r.status);}
    const d=await r.json();return d.content.map(c=>c.text||'').join('');
  }
  if(config.provider==='openai'){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+config.apiKey},body:JSON.stringify({model:config.model,max_tokens:maxTok,messages:[{role:'system',content:SYSTEM_PROMPT},{role:'user',content:userMsg}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'OpenAI API error '+r.status);}
    const d=await r.json();return d.choices[0].message.content;
  }
  if(config.provider==='gemini'){
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+config.model+':generateContent?key='+config.apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{parts:[{text:userMsg}]}],generationConfig:{maxOutputTokens:maxTok,responseMimeType:'application/json'}})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Gemini API error '+r.status);}
    const d=await r.json();return d.candidates[0].content.parts[0].text;
  }
  throw new Error('Unknown provider');
}

async function doValidate(){
  const prov=state.adminProvider||state.config?.provider||'anthropic';
  const key=val('admin-key');
  const model=val('admin-model')||PROVIDERS.find(p=>p.id===prov)?.models[0]?.id;
  if(!key.trim()){setState({validation:{ok:false,msg:'Enter an API key'}});return;}
  setState({validating:true,validation:null});
  try{
    if(prov==='anthropic'){
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:10,messages:[{role:'user',content:'Say ok'}]})});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Error '+r.status);}
    }else if(prov==='openai'){
      const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key.trim()},body:JSON.stringify({model,max_tokens:10,messages:[{role:'user',content:'Say ok'}]})});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Error '+r.status);}
    }else if(prov==='gemini'){
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key.trim(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Say ok'}]}],generationConfig:{maxOutputTokens:10}})});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Error '+r.status);}
    }
    setState({validating:false,validation:{ok:true,msg:'Key validated successfully'}});
  }catch(e){setState({validating:false,validation:{ok:false,msg:e.message}});}
}

async function doScan(){
  const topic=val('scan-topic'),context=val('scan-context'),config=state.config;
  const lens=activeLenses.size?Array.from(activeLenses).join(', '):'';
  if(!config?.apiKey){setState({error:'Configure your API key in the admin panel first.'});return;}
  if(!topic.trim()){setState({error:'Enter a topic.'});return;}
  setState({loading:true,error:''});
  try{
    const raw=await callAPI(config,topic,lens,context);
    const parsed=repairJSON(raw);
    if(!parsed.signals||!Array.isArray(parsed.signals)||parsed.signals.length===0)throw new Error('No valid signals in response. Try again.');
    const analysis={id:Date.now().toString(),topic,lens:lens||'General',context:context||'',data:parsed,createdAt:new Date().toISOString(),model:config.model,provider:config.provider};
    const updated=[analysis,...state.analyses];
    saveAnalyses(updated);
    setState({current:analysis,view:'dashboard',loading:false,activeFilter:null,picked:new Set(),deepView:false});
  }catch(e){setState({loading:false,error:e.message});}
}

  if(s.timeDetail)h+='<div class="s-detail-section" style="margin-bottom:12px"><div class="s-detail-label">Time horizon</div><div style="font-size:13px;color:#555;line-height:1.6">'+esc(s.timeDetail)+'</div></div>';
  if(s.direction)h+='<div class="s-detail-section" style="margin-bottom:12px"><div class="s-detail-label">Direction & second-order effects</div><div style="font-size:13px;color:#555;line-height:1.6">'+esc(s.direction)+'</div></div>';
  if(s.impact)h+='<div class="s-detail-section" style="margin-bottom:12px"><div class="s-detail-label">Impact</div><div style="font-size:13px;color:#555;line-height:1.6">'+esc(s.impact)+'</div></div>';
  if(s.connectedSignals)h+='<div style="font-size:11px;color:#aaa;margin-top:4px">Connected: '+esc(s.connectedSignals)+'</div>';
  h+='</div>';
  return h;
}

function renderAbout(){
  const cats=[{k:'S',name:'Social',desc:'The social fabric',c:CC.S},{k:'T',name:'Technological',desc:'Research labs',c:CC.T},{k:'E',name:'Environmental',desc:'Climate & resources',c:CC.E},{k:'Ec',name:'Economic',desc:'Markets & trade',c:CC.Ec},{k:'P',name:'Political',desc:'Policy & power',c:CC.P}];
  return'<div class="container fade-in"><div class="about-hero"><h1>See what\'s coming<br>before it arrives</h1><p>STEEP Scanner uses AI to scan the external environment for signals that could reshape your industry, market, or field of study.</p></div><div class="card"><div class="about-section"><h2>What is STEEP analysis?</h2><p>STEEP is a horizon scanning framework used in futures thinking and strategic planning. It maps external forces across five dimensions to help you see beyond your immediate context and spot emerging opportunities, threats, and convergences before they become obvious.</p><div class="about-steep">'+cats.map(c=>'<div class="about-steep-item" style="background:'+c.c.light+'"><div class="letter" style="color:'+c.c.base+'">'+c.k.charAt(0)+'</div><div class="word" style="color:'+c.c.text+'">'+c.name+'</div></div>').join('')+'</div><p>While SWOT analysis gives you the inside picture of your current position, STEEP gives you the outside perspective: what\'s happening in the world around you that you should be paying attention to.</p></div><div class="about-section"><h2>How this tool works</h2><p>Enter any topic and the AI scans across all five STEEP categories, identifying real signals with assessed strength and time horizons. Each signal includes an implication tailored to your context, so you\'re not just reading what\'s happening but understanding what it means for you.</p><p>Signals that span multiple categories (intersections) are highlighted and amplified, because convergence is where the strongest forces emerge. A technology shift that\'s also driving regulatory response and changing consumer behavior is far more significant than any of those signals alone.</p><p>Select the signals that matter to you and go deeper. The tool groups your selections by urgency and synthesizes what they mean as a whole.</p></div><div class="about-section"><h2>When to use it</h2><p>At the start of a strategy process, when entering a new market, when evaluating an investment thesis, or simply when you want to understand the landscape around a topic you care about. Students use it for coursework and research. Strategists use it to ground planning in real external signals rather than assumptions.</p></div><div class="about-section"><h2>Why this exists</h2><p>STEEP analysis has a cold-start problem. Most people either pull from their existing mental models (which defeats the purpose of scanning externally) or spend hours researching across five dimensions manually. This tool collapses that research phase and adds something humans aren\'t great at: systematically detecting where signals converge across categories. The scanning is AI-powered. The judgment of what matters is yours.</p></div><div class="about-contact"><p>Made by <strong>Rakesh Patwari</strong><br>I saw the gap between the framework and the doing, and built the bridge.</p><a href="https://www.linkedin.com/in/rakeshpatwari/" target="_blank">Connect on LinkedIn</a><span style="margin:0 10px;color:#ccc">\u00b7</span><a href="mailto:rakesh@rakeshpatwari.design">rakesh@rakeshpatwari.design</a></div></div></div>';
}

function renderFooter(){
  const tips=['Try scanning your own industry.','Intersections are where the real signals hide.','The best strategies start with what you don\'t know yet.','SWOT looks inward. STEEP looks outward.','A weak signal today can be a strong force in five years.','What converges, compounds.'];
  const tip=tips[Math.floor(new Date().getMinutes()/10)%tips.length];
  return'<footer class="footer"><div class="footer-tagline">'+tip+'</div><div class="footer-line"><a href="https://www.linkedin.com/in/rakeshpatwari/" target="_blank">Rakesh Patwari</a></div></footer>';
}

// ── Render ──
function render(){
  // Capture current input values before DOM is destroyed
  const savedInputs={};
  ['scan-topic','scan-context','admin-key','admin-model'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)savedInputs[id]=el.value;
  });
  const focusId=document.activeElement?.id;

  let html=renderHeader();
  if(state.view==='admin')html+=renderAdmin();
  else if(state.view==='about')html+=renderAbout();
  else if(state.view==='dashboard')html+=renderDash();
  else html+=renderHome();
  html+=renderFooter();
  document.getElementById('app').innerHTML=html;

  // Restore input values
  Object.entries(savedInputs).forEach(([id,v])=>{
    const el=document.getElementById(id);
    if(el)el.value=v;
  });

  // Restore focus
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(el.type==='text'||el.type==='password'){const len=el.value.length;el.setSelectionRange(len,len);}}
  }
}

render();
</script>
